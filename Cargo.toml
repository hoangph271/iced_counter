[package]
name = "iced_counter"
version = "0.1.0"
edition = "2021"

[dependencies]
iced = { version = "0.14.0", features = ["tokio", "image", "sysinfo"] }
image = { version = "0.25.9", optional = true }
native-dialog = { version = "0.9.4", optional = true }
nokhwa = { version = "0.10.10", features = ["input-native"] }
# TODO: make nokhwa optional with a feature flag
rfd = { version = "0.16.0", optional = true }
tokio = { version = "1.48.0", features = ["rt-multi-thread"] }

[profile.release]
strip = true
lto = true
panic = "abort"
codegen-units = 1

[features]
system_info = []
instax_framer = ["dep:rfd", "dep:native-dialog", "dep:image"]
counter = []
ddp = []
omni_themes = []

default = ["instax_framer", "system_info", "counter", "ddp", "omni_themes"]
